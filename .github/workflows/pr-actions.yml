name: PR Actions

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-actions-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DOTNET_NOLOGO: true
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/NatsManager.Frontend/package-lock.json

      - name: Restore Aspire workload
        run: dotnet workload restore NatsManager.slnx

      - name: Restore .NET dependencies
        run: dotnet restore NatsManager.slnx

      - name: Install frontend dependencies
        working-directory: src/NatsManager.Frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/NatsManager.Frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: src/NatsManager.Frontend
        run: npm test

      - name: Build .NET solution
        run: dotnet build NatsManager.slnx --configuration Release --no-restore

      - name: Run .NET unit tests
        run: |
          dotnet test tests/NatsManager.Domain.Tests/NatsManager.Domain.Tests.csproj --configuration Release --no-build --verbosity minimal
          dotnet test tests/NatsManager.Application.Tests/NatsManager.Application.Tests.csproj --configuration Release --no-build --verbosity minimal
          dotnet test tests/NatsManager.Infrastructure.Tests/NatsManager.Infrastructure.Tests.csproj --configuration Release --no-build --verbosity minimal
          dotnet test tests/NatsManager.Web.Tests/NatsManager.Web.Tests.csproj --configuration Release --no-build --verbosity minimal

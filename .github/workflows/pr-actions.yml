name: PR Actions

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-actions-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DOTNET_NOLOGO: true
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: /home/runner/work/nats-manager-ui/nats-manager-ui/src/NatsManager.Frontend/package-lock.json

      - name: Restore Aspire workload
        run: dotnet workload restore NatsManager.slnx

      - name: Restore .NET dependencies
        run: dotnet restore NatsManager.slnx

      - name: Install frontend dependencies
        working-directory: src/NatsManager.Frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/NatsManager.Frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: src/NatsManager.Frontend
        run: npm test

      - name: Build .NET solution
        run: dotnet build NatsManager.slnx --configuration Release --no-restore

      - name: Install Playwright browsers
        run: pwsh tests/NatsManager.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run .NET tests
        run: dotnet test --solution NatsManager.slnx --configuration Release --no-build --verbosity minimal

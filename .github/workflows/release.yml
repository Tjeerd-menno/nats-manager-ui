name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        default: 0.1.0-beta
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish container and release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '$version' must be SemVer, for example 0.1.0-beta." >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "image=ghcr.io/${GITHUB_REPOSITORY,,}"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=beta,enable=${{ contains(steps.vars.outputs.version, 'beta') }}

      - name: Build and publish container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/NatsManager.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: NATS Manager UI ${{ steps.vars.outputs.version }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          make_latest: false
          generate_release_notes: true
          body: |
            Container image:

            ```text
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.version }}
            ```

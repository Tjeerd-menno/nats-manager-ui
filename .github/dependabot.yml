version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions-major:
        patterns: ["*"]
        update-types: ["major"]
      github-actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # NuGet (.NET backend)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      nuget-major:
        patterns: ["*"]
        update-types: ["major"]
      nuget-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # npm (React frontend)
  - package-ecosystem: "npm"
    directory: "/src/NatsManager.Frontend"
    schedule:
      interval: "daily"
    groups:
      npm-major:
        patterns: ["*"]
        update-types: ["major"]
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
